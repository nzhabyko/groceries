<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groceries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2ED;
    --surface: #FDFCFA;
    --surface2: #EDE9E2;
    --ink: #1A1714;
    --ink2: #6B6560;
    --ink3: #A09A93;
    --accent: #2D6A4F;
    --accent-light: #D8EBE3;
    --accent-mid: #52B788;
    --danger: #C1440E;
    --done-bg: #F0EDE8;
    --border: rgba(26,23,20,0.1);
    --border2: rgba(26,23,20,0.06);
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .app-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink2);
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink3);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .sync-dot.synced { background: var(--accent-mid); }
  .sync-dot.syncing { background: #E9C46A; animation: pulse 0.8s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .sync-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.04em;
  }

  /* ── Add bar ── */
  .add-bar {
    display: flex;
    gap: 8px;
  }

  .add-input {
    flex: 1;
    height: 42px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 14px;
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .add-input::placeholder { color: var(--ink3); }
  .add-input:focus {
    border-color: var(--accent);
    background: var(--surface);
  }

  .qty-input {
    width: 64px;
    height: 42px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }
  .qty-input:focus { border-color: var(--accent); }
  .qty-input::placeholder { color: var(--ink3); }

  .add-btn {
    height: 42px;
    padding: 0 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #235C43; }
  .add-btn:active { transform: scale(0.97); }

  /* ── Body ── */
  .app-body { padding: 20px 20px 80px; max-width: 520px; margin: 0 auto; }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    text-align: center;
  }
  .stat-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-num.green { color: var(--accent); }
  .stat-label {
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ── Section ── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    margin-top: 22px;
  }
  .section-head:first-of-type { margin-top: 0; }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .clear-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 0;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--danger); }

  /* ── Item ── */
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    margin-bottom: 6px;
    transition: opacity 0.2s, background 0.2s;
    animation: slideIn 0.18s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item.done {
    background: var(--done-bg);
    border-color: transparent;
    opacity: 0.65;
  }

  .check-wrap {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .check-wrap:hover { border-color: var(--accent-mid); }
  .item.done .check-wrap {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-icon {
    display: none;
  }
  .item.done .check-icon { display: block; }

  .item-body { flex: 1; min-width: 0; }

  .item-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }
  .item.done .item-name {
    text-decoration: line-through;
    color: var(--ink3);
  }

  .item-qty {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    margin-top: 1px;
    letter-spacing: 0.04em;
  }

  .item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink3);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .item:hover .item-del { opacity: 1; }
  .item-del:hover { background: #FDEEE8; color: var(--danger); }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink3);
  }
  .empty-icon {
    font-size: 32px;
    margin-bottom: 10px;
    opacity: 0.5;
  }
  .empty-text {
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Footer ── */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    text-align: center;
  }
  .footer-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.04em;
  }

  /* ── Mobile ── */
  @media (max-width: 400px) {
    .qty-input { display: none; }
    .app-title { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <span class="app-title">🛒 Grocery list</span>
    <span>
      <span class="sync-dot" id="sync-dot"></span>
      <span class="sync-label" id="sync-label">loading...</span>
    </span>
  </div>
  <div class="add-bar">
    <input class="add-input" id="item-input" type="text" placeholder="Add item…" autocomplete="off" />
    <input class="qty-input" id="qty-input" type="text" placeholder="qty" />
    <button class="add-btn" onclick="addItem()">Add</button>
  </div>
</div>

<div class="app-body">
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-todo">0</div>
      <div class="stat-label">To buy</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="stat-done">0</div>
      <div class="stat-label">In cart</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>

  <div id="main-list"></div>
</div>

<div class="footer">
  <span class="footer-text" id="footer-text">shared list · updates every 15s</span>
</div>

<script>
// ── Storage key (shared) ──
const KEY = 'grocery-v1';
let items = [];
let syncTimer = null;

// ── GitHub Gist config ──
// To use GitHub Gist as backend:
// 1. Create a gist at https://gist.github.com with a file named "grocery.json" containing []
// 2. Create a personal access token at https://github.com/settings/tokens with "gist" scope
// 3. Fill in GIST_ID and GIST_TOKEN below
const GIST_ID = '21e2b48167302c54d1849b82b48340ad';
const GIST_TOKEN = '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';
const GIST_FILE = 'grocery.json';

const useGist = GIST_ID && GIST_TOKEN;

// ── LocalStorage fallback ──
function lsLoad() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
}
function lsSave(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

// ── Gist sync ──
async function gistLoad() {
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { Authorization: `token ${GIST_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('gist fetch failed');
    const data = await r.json();
    const content = data.files[GIST_FILE]?.content || '[]';
    return JSON.parse(content);
  } catch(e) { console.error('Gist load error:', e); return null; }
}

async function gistSave(data) {
  try {
    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        Authorization: `token ${GIST_TOKEN}`,
        'Content-Type': 'application/json',
        Accept: 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } })
    });
  } catch(e) { console.error('Gist save error:', e); }
}

// ── State ──
function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  if (state === 'synced') label.textContent = useGist ? 'synced' : 'local mode';
  if (state === 'syncing') label.textContent = 'syncing…';
  if (state === '') { dot.className = 'sync-dot'; label.textContent = 'offline'; }
}

// ── Load ──
async function load(silent) {
  if (!silent) setSyncState('syncing');
  let loaded;
  if (useGist) {
    loaded = await gistLoad();
    if (loaded === null) { loaded = lsLoad(); setSyncState(''); }
    else { lsSave(loaded); setSyncState('synced'); }
  } else {
    loaded = lsLoad();
    setSyncState('synced');
  }
  items = loaded;
  render();
  updateFooter();
}

// ── Save ──
async function save() {
  lsSave(items);
  if (useGist) {
    setSyncState('syncing');
    await gistSave(items);
    setSyncState('synced');
  }
  updateFooter();
}

function updateFooter() {
  const el = document.getElementById('footer-text');
  const now = new Date();
  const t = now.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
  el.textContent = useGist ? `synced ${t} · updates every 15s` : 'local mode · fill in GIST_ID & GIST_TOKEN to share';
}

// ── Add ──
function addItem() {
  const nameEl = document.getElementById('item-input');
  const qtyEl = document.getElementById('qty-input');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const qty = qtyEl.value.trim();
  items.unshift({ id: Date.now(), name, qty, done: false });
  nameEl.value = '';
  qtyEl.value = '';
  nameEl.focus();
  save(); render();
}

// ── Toggle ──
function toggle(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.done = !item.done;
  save(); render();
}

// ── Delete ──
function del(id) {
  items = items.filter(i => i.id !== id);
  save(); render();
}

// ── Clear done ──
function clearDone() {
  if (!confirm('Remove all purchased items?')) return;
  items = items.filter(i => !i.done);
  save(); render();
}

// ── Render ──
function render() {
  const todo = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  document.getElementById('stat-todo').textContent = todo.length;
  document.getElementById('stat-done').textContent = done.length;
  document.getElementById('stat-total').textContent = items.length;

  let html = '';

  if (items.length === 0) {
    html = `<div class="empty">
      <div class="empty-icon">🥦</div>
      <div class="empty-text">Your list is empty.<br>Add the first item above.</div>
    </div>`;
  } else {
    if (todo.length > 0) {
      html += `<div class="section-head"><span class="section-title">To buy · ${todo.length}</span></div>`;
      html += todo.map(itemHTML).join('');
    }
    if (done.length > 0) {
      html += `<div class="section-head" style="margin-top:20px">
        <span class="section-title">In cart · ${done.length}</span>
        <button class="clear-btn" onclick="clearDone()">Clear all</button>
      </div>`;
      html += done.map(itemHTML).join('');
    }
  }

  document.getElementById('main-list').innerHTML = html;
}

function itemHTML(item) {
  const qty = item.qty ? `<div class="item-qty">${esc(item.qty)}</div>` : '';
  return `<div class="item${item.done ? ' done' : ''}">
    <div class="check-wrap" onclick="toggle(${item.id})">
      <svg class="check-icon" width="11" height="11" viewBox="0 0 11 11" fill="none">
        <polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="item-body">
      <div class="item-name">${esc(item.name)}</div>
      ${qty}
    </div>
    <button class="item-del" onclick="del(${item.id})">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Keyboard ──
document.getElementById('item-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const qtyEl = document.getElementById('qty-input');
    if (document.activeElement === document.getElementById('item-input') && !qtyEl.style.display) {
      addItem();
    }
  }
});
document.getElementById('qty-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// ── Auto-refresh ──
load(false);
setInterval(() => load(true), 15000);
</script>
</body>
</html>
